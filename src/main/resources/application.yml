spring:
  application:
    name: smpp-gateway
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}

server:
  port: 8081

smpp:
  port: 2775
  processor-degree: 4
  bind-timeout-ms: 15000
  system-id: gateway
  password: gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    dev.pseonkyaw.smppgateway: INFO
    org.jsmpp: WARN
